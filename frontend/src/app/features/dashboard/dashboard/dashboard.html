<div class="dashboard">
  <div class="stats-grid">
    @for (stat of stats; track stat.title) {
      <app-stats-card
        [title]="stat.title"
        [value]="stat.value"
        [icon]="stat.icon"
        [color]="stat.color"
        [change]="stat.change"
        [trend]="stat.trend"
        [route]="stat.route"
        (cardClick)="navigate($event)"
      >
      </app-stats-card>
    }
  </div>

  <div class="dashboard-content">
    <app-recent-activity [activities]="activities"> 
      
    </app-recent-activity>

    <div class="quick-actions">
      <h2>Quick Actions</h2>

      @for (action of actions; track action.title) {
        <app-action-card
          [title]="action.title"
          [subtitle]="action.subtitle"
          [icon]="action.icon"
          [color]="action.color"
          (clicked)="navigate(action.route)"
        >
        </app-action-card>
      }
    </div>
  </div>
</div>
