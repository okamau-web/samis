<div class="table-container">
  @if (loading) {
    <div class="loading">Loading...</div>
  } @else {
    <table mat-table [dataSource]="data" class="data-table">
      <!-- Dynamic Columns -->

      @for (column of columns; track column.key) {
        <ng-container [matColumnDef]="column.key">
          <th mat-header-cell *matHeaderCellDef>
            {{ column.label }}
          </th>

          <td mat-cell *matCellDef="let row">
            {{ row[column.key] }}
          </td>
        </ng-container>
      }

      <!-- Actions -->

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>

        <td mat-cell *matCellDef="let row">
          <button
            mat-icon-button
            color="primary"
            (click)="emitAction('view', row)"
            matTooltip="View Details"
          >
            <mat-icon>visibility</mat-icon>
          </button>

          <button
            mat-icon-button
            color="accent"
            (click)="emitAction('edit', row)"
            matTooltip="Edit Record"
          >
            <mat-icon>edit</mat-icon>
          </button>

          <button
            mat-icon-button
            color="warn"
            (click)="emitAction('delete', row)"
            matTooltip="Delete Record"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>

      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <!-- Empty State -->

      <tr *ngIf="!data.length">
        <td [attr.colspan]="displayedColumns.length" class="empty-state">
          <mat-icon>inbox</mat-icon>

          <p>No records found.</p>
        </td>
      </tr>
    </table>
  }

  <mat-paginator
    [length]="total"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 20, 50]"
    (page)="onPage($event)"
  >
  </mat-paginator>
</div>
