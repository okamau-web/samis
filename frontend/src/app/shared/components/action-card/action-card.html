 <div
    class="action-card"
    (click)="onClick()">

    <div
        class="icon"
        [style.background]="color">

        <mat-icon>

            {{ icon }}

        </mat-icon>

    </div>

    <div class="content">

        <h3>

            {{ title }}

        </h3>

        <p>

            {{ subtitle }}

        </p>

    </div>

</div>
