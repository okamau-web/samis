 <div class="page-header">

  <div class="header-left">

    @if (showBackButton) {

      <button
          mat-stroked-button
          color="primary"
          (click)="back.emit()">

          <mat-icon>arrow_back</mat-icon>

          {{ backButtonText }}

      </button>

    }

    <div class="titles">

      <h1>{{ title }}</h1>

      <p>{{ subtitle }}</p>

    </div>

  </div>

  <div class="header-actions">

    <ng-content></ng-content>

  </div>

</div>
